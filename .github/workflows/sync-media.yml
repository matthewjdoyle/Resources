name: Sync media to Cloudflare R2

on:
  push:
    branches: [main]
    paths:
      - "**.gif"
      - "**.png"
      - "**.jpg"
      - "**.jpeg"
      - "**.webp"
      - "**.svg"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Sync media to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          rclone sync . r2:${{ vars.R2_BUCKET_NAME }} \
            --include "*.{gif,png,jpg,jpeg,webp,svg}" \
            --exclude "Image-Vectorizer/test-images/**" \
            -v

      - name: Generate CDN config
        run: |
          cat > shared/cdn-config.json <<EOF
          {
            "cdnBaseUrl": "${{ vars.R2_PUBLIC_URL }}",
            "extensions": ["gif", "png", "jpg", "jpeg", "webp", "svg"],
            "exclude": ["Image-Vectorizer/test-images/"]
          }
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate gallery.js
        run: python Dev-Tools/generate-gallery.py

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/cdn-config.json shared/gallery.js
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "Update CDN config and gallery [skip ci]" && git push)
