<!-- Lightbox -->

  <img id="lightbox-img" src="" alt="" />
</div>

<footer class="site-footer">

    matthewd0yle.com
  </a>
</footer>

<script src="nav.js"></script>
<script src="toc.js"></script>
<script src="gallery.js"></script>
<script>
renderTOC('sidebar-nav', '/shared/gallery.html');

// Render gallery
var grid = document.getElementById('gallery-grid');
GALLERY.forEach(function(item) {
  var file = item.src.split('/').pop();
  var a = document.createElement('a');
  a.className = 'gallery-card';
  a.href = item.topicHref;
  a.dataset.topic = item.topic.toLowerCase();
  a.dataset.file = file.toLowerCase();
  a.innerHTML =
    '<figure>' +
    '<img src="' + item.src + '" alt="' + item.alt + '" loading="lazy" />' +
    '<figcaption>' + item.topic + '</figcaption>' +
    '</figure>';
  // Open lightbox on image click, not card navigate
  a.querySelector('img').addEventListener('click', function(e) {
    e.preventDefault();
    openLightbox(item.src, item.alt);
  });
  grid.appendChild(a);
});

// Search filter
document.getElementById('gallery-search').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  var cards = grid.querySelectorAll('.gallery-card');
  cards.forEach(function(card) {
    var match = !q || card.dataset.topic.includes(q) || card.dataset.file.includes(q);
    card.classList.toggle('hidden', !match);
  });
});

// Lightbox
var lightbox = document.getElementById('lightbox');
var lightboxImg = document.getElementById('lightbox-img');

function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt;
  lightbox.classList.add('open');
}
function closeLightbox() {
  lightbox.classList.remove('open');
  lightboxImg.src = '';
}
lightbox.addEventListener('click', closeLightbox);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
