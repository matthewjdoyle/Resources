<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single+Ink:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/style.css" />
  <script src="shared/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$','$'], ['\\(','\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']]
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>

<header>
  <div class="header-actions">
    <button id="hamburger-btn" aria-label="Toggle sidebar" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="title-bar">
      <h1>Resources</h1>
      <span class="subtitle">Scripts, references &amp; templates</span>
    </div>
  </div>
  <button id="theme-btn" onclick="toggleTheme()" aria-label="Toggle colour theme"></button>
</header>

<div class="layout">
<nav class="sidebar" id="sidebar" aria-label="Navigation">
  <button id="sidebar-close-btn" aria-label="Close navigation menu" onclick="closeSidebar()">&times;</button>
  <div id="sidebar-nav"></div>
  <div class="sidebar-bottom">
    <a class="sidebar-github" href="https://github.com/matthewjdoyle/Resources" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      View on GitHub
    </a>
  </div>
</nav>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="dashboard">

  <div class="hero">
    <h1>Resources</h1>
    <p>A selection of scripts, templates and tools for solving problems.</p>
  </div>

  <div id="dashboard-cards"></div>

  <!-- ── README ──────────────────────────────────────────────────── -->
  <div class="category" id="readme">
    <div id="readme-content">
      <p style="color:var(--muted);">Loading README...</p>
    </div>
  </div>

</div>
</div>

<footer class="site-footer">
  <a href="https://www.matthewd0yle.com" target="_blank" rel="noopener">
    <img src="https://www.matthewd0yle.com/favicon.ico" alt="" width="16" height="16" class="footer-icon" />
    matthewd0yle.com
  </a>
</footer>

<script src="shared/nav.js"></script>
<script src="shared/toc.js"></script>
<script>
  renderTOC('sidebar-nav', null);
  renderCards('dashboard-cards');

  fetch('README.md')
    .then(r => {
      if (!r.ok) throw new Error('Could not load README.md (' + r.status + ')');
      return r.text();
    })
    .then(md => {
      document.getElementById('readme-content').innerHTML = marked.parse(md);
      if (window.MathJax && window.MathJax.typesetPromise) {
        MathJax.typesetPromise([document.getElementById('readme-content')]);
      }
    })
    .catch(err => {
      document.getElementById('readme-content').innerHTML = 
        '<p style="color:var(--accent3);">' + err.message + '</p>';
    });
</script>
</body>
</html>
